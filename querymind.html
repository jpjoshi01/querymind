<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QueryMind - AI SQL & NoSQL Optimizer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f5f4;
    --color-background-tertiary: #f0efed;
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #6b6b6b;
    --color-text-tertiary: #9b9b9b;
    --color-border-tertiary: rgba(0,0,0,0.12);
    --color-border-secondary: rgba(0,0,0,0.2);
    --color-border-primary: rgba(0,0,0,0.3);
    --color-background-info: #E6F1FB;
    --color-text-info: #185FA5;
    --color-background-success: #EAF3DE;
    --color-text-success: #3B6D11;
    --color-background-warning: #FAEEDA;
    --color-text-warning: #854F0B;
    --color-background-danger: #FCEBEB;
    --color-text-danger: #A32D2D;
    --font-sans: system-ui, -apple-system, sans-serif;
    --font-mono: 'Courier New', monospace;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
    --border-radius-xl: 16px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1c1c1e;
      --color-background-secondary: #2c2c2e;
      --color-background-tertiary: #111111;
      --color-text-primary: #f0f0f0;
      --color-text-secondary: #ababab;
      --color-text-tertiary: #6b6b6b;
      --color-border-tertiary: rgba(255,255,255,0.1);
      --color-border-secondary: rgba(255,255,255,0.18);
      --color-border-primary: rgba(255,255,255,0.28);
      --color-background-info: #0c2a44;
      --color-text-info: #85B7EB;
      --color-background-success: #172d08;
      --color-text-success: #97C459;
      --color-background-warning: #3a2500;
      --color-text-warning: #EF9F27;
      --color-background-danger: #2d0d0d;
      --color-text-danger: #F09595;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: var(--color-background-tertiary); color: var(--color-text-primary); min-height: 100vh; }
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 220px; background: var(--color-background-primary); border-right: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-logo { padding: 16px; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; background: #185FA5; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; }
  .logo-text { font-weight: 500; font-size: 14px; line-height: 1.2; }
  .logo-sub { font-size: 11px; color: var(--color-text-secondary); }
  .sidebar-nav { flex: 1; padding: 8px; overflow-y: auto; }
  .nav-section { margin-bottom: 16px; }
  .nav-label { font-size: 10px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; padding: 4px 8px; margin-bottom: 2px; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--border-radius-md); cursor: pointer; font-size: 13px; color: var(--color-text-secondary); transition: all 0.1s; border: none; background: none; width: 100%; text-align: left; }
  .nav-item:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
  .nav-item.active { background: #E6F1FB; color: #185FA5; font-weight: 500; }
  .nav-item i { font-size: 16px; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { background: var(--color-background-primary); border-bottom: 0.5px solid var(--color-border-tertiary); padding: 0 20px; height: 52px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .topbar-title { font-size: 15px; font-weight: 500; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
  .badge-blue { background: #E6F1FB; color: #185FA5; }
  .badge-green { background: #EAF3DE; color: #3B6D11; }
  .badge-amber { background: #FAEEDA; color: #854F0B; }
  .badge-red { background: #FCEBEB; color: #A32D2D; }
  .content { flex: 1; overflow-y: auto; padding: 20px; }
  .card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 16px 20px; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .tabs { display: flex; gap: 2px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 3px; margin-bottom: 16px; }
  .tab { flex: 1; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--color-text-secondary); transition: all 0.1s; text-align: center; }
  .tab.active { background: var(--color-background-primary); color: var(--color-text-primary); border: 0.5px solid var(--color-border-tertiary); }
  textarea.code-editor { width: 100%; min-height: 160px; font-family: var(--font-mono); font-size: 13px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 12px; color: var(--color-text-primary); resize: vertical; line-height: 1.6; outline: none; }
  textarea.code-editor:focus { border-color: #185FA5; }
  .btn { padding: 8px 16px; border-radius: var(--border-radius-md); font-size: 13px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--color-border-secondary); background: none; color: var(--color-text-primary); transition: all 0.1s; display: inline-flex; align-items: center; gap: 6px; }
  .btn:hover { background: var(--color-background-secondary); }
  .btn-primary { background: #185FA5; color: white; border-color: #185FA5; }
  .btn-primary:hover { background: #0C447C; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  select, input[type=text] { padding: 7px 10px; border-radius: var(--border-radius-md); font-size: 13px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); color: var(--color-text-primary); outline: none; cursor: pointer; }
  .score-bar { height: 8px; border-radius: 4px; background: var(--color-background-secondary); overflow: hidden; margin: 6px 0; }
  .score-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }
  .finding { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 14px; margin-bottom: 8px; }
  .finding-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .finding-body { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; }
  .finding-fix { margin-top: 6px; font-size: 12px; background: var(--color-background-secondary); padding: 6px 10px; border-radius: 6px; border-left: 2px solid #378ADD; }
  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 14px; }
  .stat-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 500; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--color-border-secondary); border-top-color: #185FA5; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .upload-zone { border: 1.5px dashed var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 24px; text-align: center; cursor: pointer; transition: all 0.15s; }
  .upload-zone:hover { border-color: #185FA5; background: rgba(24,95,165,0.04); }
  .upload-zone i { font-size: 28px; color: var(--color-text-tertiary); display: block; margin-bottom: 8px; }
  .result-stream { font-size: 13px; line-height: 1.7; color: var(--color-text-primary); white-space: pre-wrap; }
  .history-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 13px; }
  .history-icon { width: 32px; height: 32px; border-radius: var(--border-radius-md); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .chat-messages { max-height: 400px; overflow-y: auto; margin-bottom: 12px; }
  .chat-msg { margin-bottom: 10px; }
  .chat-msg.user { text-align: right; }
  .chat-bubble { display: inline-block; max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
  .chat-bubble.user { background: #185FA5; color: white; border-radius: 12px 12px 2px 12px; }
  .chat-bubble.ai { background: var(--color-background-secondary); color: var(--color-text-primary); border-radius: 12px 12px 12px 2px; text-align: left; }
  .setup-backdrop { position: fixed; inset: 0; z-index: 20; background: rgba(0,0,0,0.42); display: flex; align-items: center; justify-content: center; padding: 20px; }
  .setup-dialog { width: min(460px, 100%); background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 20px; box-shadow: 0 18px 50px rgba(0,0,0,0.25); }
  .setup-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .setup-copy { font-size: 13px; line-height: 1.55; color: var(--color-text-secondary); margin-bottom: 14px; }
  .setup-field { margin-bottom: 12px; }
  .setup-field label { display: block; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .setup-field select, .setup-field input { width: 100%; }
  .setup-error { min-height: 18px; font-size: 12px; color: var(--color-text-danger); margin-bottom: 10px; }
  .setup-actions { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
  .hidden { display: none !important; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--color-border-secondary); border-radius: 3px; }
  @media (max-width: 700px) {
    .sidebar { width: 48px; }
    .logo-text, .logo-sub, .nav-label, .nav-item span { display: none; }
    .stat-grid { grid-template-columns: 1fr 1fr; }
    .compare-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon"><i class="ti ti-database-cog"></i></div>
    <div>
      <div class="logo-text">QueryMind</div>
      <div class="logo-sub">AI SQL Optimizer</div>
    </div>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-label">Analysis</div>
      <button class="nav-item active" onclick="navigate('optimizer')"><i class="ti ti-wand"></i><span>Query Optimizer</span></button>
      <button class="nav-item" onclick="navigate('explain')"><i class="ti ti-sitemap"></i><span>Explain Plan</span></button>
      <button class="nav-item" onclick="navigate('awr')"><i class="ti ti-file-analytics"></i><span>AWR / Reports</span></button>
      <button class="nav-item" onclick="navigate('compare')"><i class="ti ti-arrows-diff"></i><span>Compare Queries</span></button>
    </div>
    <div class="nav-section">
      <div class="nav-label">Tools</div>
      <button class="nav-item" onclick="navigate('index')"><i class="ti ti-list-search"></i><span>Index Advisor</span></button>
      <button class="nav-item" onclick="navigate('datagen')"><i class="ti ti-table-plus"></i><span>Data Generator</span></button>
      <button class="nav-item" onclick="navigate('nl')"><i class="ti ti-message-chatbot"></i><span>NL Assistant</span></button>
    </div>
    <div class="nav-section">
      <div class="nav-label">Insights</div>
      <button class="nav-item" onclick="navigate('dashboard')"><i class="ti ti-layout-dashboard"></i><span>Dashboard</span></button>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">Query Optimizer</div>
    <div class="topbar-actions">
      <select id="db-select" onchange="updateDB()">
        <option>PostgreSQL</option><option>Oracle</option><option>MySQL</option>
        <option>SQL Server</option><option>MariaDB</option><option>Snowflake</option>
        <option>MongoDB</option><option>Cassandra</option><option>Redis</option><option>Elasticsearch</option>
      </select>
      <select id="llm-select" onchange="updateLLM()" title="Choose AI model">
        <option value="">Checking AI providers...</option>
      </select>
      <button class="btn btn-sm" onclick="showApiKeySetup(false)" title="Add or change API key"><i class="ti ti-key"></i> API Key</button>
      <span class="badge badge-blue" id="mode-badge">SQL</span>
    </div>
  </div>
  <div class="content" id="main-content"></div>
</div>
</div>

<div class="setup-backdrop hidden" id="api-key-modal">
  <div class="setup-dialog">
    <div class="setup-title">Set up your AI provider</div>
    <div class="setup-copy">
      Enter your own API key once on this machine. QueryMind stores it in Windows Credential Manager, not in the browser and not in this project folder.
    </div>
    <div class="setup-field">
      <label for="setup-provider">AI provider</label>
      <select id="setup-provider">
        <option value="openai">OpenAI (GPT)</option>
        <option value="claude">Claude (Anthropic)</option>
        <option value="kimi">Kimi (Moonshot AI)</option>
      </select>
    </div>
    <div class="setup-field">
      <label for="setup-api-key">API key</label>
      <input type="password" id="setup-api-key" placeholder="Paste your API key" autocomplete="off">
    </div>
    <div class="setup-error" id="setup-error"></div>
    <div class="setup-actions">
      <button class="btn btn-sm" id="setup-remove-btn" onclick="removeSelectedProviderKey()"><i class="ti ti-trash"></i> Remove Saved Key</button>
      <button class="btn btn-sm" id="setup-cancel-btn" onclick="hideApiKeySetup()"><i class="ti ti-x"></i> Cancel</button>
      <button class="btn btn-primary" onclick="saveApiKey()"><i class="ti ti-device-floppy"></i> Save Key</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
// All AI calls go through the local backend server (server.js). API keys are
// saved in the OS credential store and are never stored in the browser.
const CHAT_API = "/api/chat";

let currentLLM = "";
let currentPage = "optimizer";
let analysisHistory = [];
let chatHistory = [];
let configuredProviderData = [];
let setupRequired = false;

const noSqlDbs = ["MongoDB","Cassandra","Redis","Elasticsearch"];
const providerLabels = {
  openai: "OpenAI (GPT)",
  claude: "Claude (Anthropic)",
  kimi: "Kimi (Moonshot AI)"
};

function updateDB() {
  const db = document.getElementById("db-select").value;
  const badge = document.getElementById("mode-badge");
  badge.textContent = noSqlDbs.includes(db) ? "NoSQL" : "SQL";
  badge.className = "badge " + (noSqlDbs.includes(db) ? "badge-amber" : "badge-blue");
}

function updateLLM() {
  currentLLM = document.getElementById("llm-select").value;
}

async function loadConfiguredProviders() {
  const select = document.getElementById("llm-select");
  try {
    const resp = await fetch("/api/providers");
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || "Could not load providers");

    configuredProviderData = data.providers || [];
    const providers = (data.providers || []).filter(provider => provider.configured);
    if (!providers.length) {
      select.innerHTML = '<option value="">No AI provider configured</option>';
      select.disabled = true;
      currentLLM = "";
      showApiKeySetup(true);
      return;
    }

    select.disabled = false;
    select.innerHTML = providers
      .map(provider => `<option value="${provider.id}">${provider.label}</option>`)
      .join("");
    currentLLM = data.defaultProvider || providers[0].id;
    select.value = currentLLM;
    if (currentLLM) document.getElementById("setup-provider").value = currentLLM;
    hideApiKeySetup();
  } catch (err) {
    select.innerHTML = '<option value="">Backend unavailable</option>';
    select.disabled = true;
    currentLLM = "";
    document.getElementById("setup-error").textContent = err.message;
    showApiKeySetup(true);
  }
}

function showApiKeySetup(required = false) {
  setupRequired = required;
  document.getElementById("api-key-modal").classList.remove("hidden");
  document.getElementById("setup-cancel-btn").classList.toggle("hidden", required);
  document.getElementById("setup-remove-btn").classList.toggle("hidden", required);
  document.getElementById("setup-api-key").value = "";
  if (currentLLM) document.getElementById("setup-provider").value = currentLLM;
  setTimeout(() => document.getElementById("setup-api-key").focus(), 50);
}

function hideApiKeySetup() {
  if (setupRequired && !currentLLM) return;
  document.getElementById("api-key-modal").classList.add("hidden");
  document.getElementById("setup-error").textContent = "";
}

async function saveApiKey() {
  const provider = document.getElementById("setup-provider").value;
  const apiKey = document.getElementById("setup-api-key").value.trim();
  const errEl = document.getElementById("setup-error");
  errEl.textContent = "";

  if (!apiKey) {
    errEl.textContent = "Enter an API key first.";
    return;
  }

  try {
    const resp = await fetch("/api/credentials", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ provider, apiKey })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || "Could not save API key");

    currentLLM = provider;
    setupRequired = false;
    await loadConfiguredProviders();
    document.getElementById("llm-select").value = provider;
    updateLLM();
  } catch (err) {
    errEl.textContent = err.message;
  }
}

async function removeSelectedProviderKey() {
  const provider = document.getElementById("setup-provider").value;
  const errEl = document.getElementById("setup-error");
  errEl.textContent = "";

  if (!confirm(`Remove the saved ${providerLabels[provider]} API key from this machine?`)) return;

  try {
    const resp = await fetch(`/api/credentials/${provider}`, { method: "DELETE" });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || "Could not remove API key");
    await loadConfiguredProviders();
  } catch (err) {
    errEl.textContent = err.message;
  }
}

function navigate(page) {
  currentPage = page;
  document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
  const titles = { optimizer:"Query Optimizer", explain:"Explain Plan Analysis", awr:"AWR & Performance Reports", compare:"Compare Queries", index:"Index Advisor", datagen:"Data Generator", nl:"NL Assistant", dashboard:"Dashboard" };
  document.getElementById("page-title").textContent = titles[page] || page;
  event && event.currentTarget && event.currentTarget.classList.add("active");
  renderPage(page);
}

function renderPage(page) {
  const c = document.getElementById("main-content");
  const pages = { optimizer:renderOptimizer, explain:renderExplain, awr:renderAWR, compare:renderCompare, index:renderIndex, datagen:renderDatagen, nl:renderNL, dashboard:renderDashboard };
  if (pages[page]) pages[page](c);
}

async function callAI(systemPrompt, userPrompt) {
  if (!currentLLM) {
    throw new Error("No AI provider is configured. Add your API key with the API Key button.");
  }

  const resp = await fetch(CHAT_API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      provider: currentLLM,
      system: systemPrompt,
      prompt: userPrompt,
      max_tokens: 2000
    })
  });

  const data = await resp.json();
  if (!resp.ok) throw new Error(data.error || "API error " + resp.status);
  return data.text;
}

// ── OPTIMIZER ─────────────────────────────────────────────────────────────────
function renderOptimizer(c) {
  c.innerHTML = `
  <div class="card">
    <div class="card-title"><i class="ti ti-code"></i> Input Query</div>
    <div class="tabs">
      <button class="tab active" onclick="switchInputTab(this,'paste')">Paste Query</button>
      <button class="tab" onclick="switchInputTab(this,'upload')">Upload File</button>
    </div>
    <div id="input-paste">
      <textarea class="code-editor" id="query-input" placeholder="Paste your SQL or NoSQL query here..."></textarea>
    </div>
    <div id="input-upload" class="hidden">
      <div class="upload-zone" onclick="document.getElementById('file-upload').click()">
        <i class="ti ti-upload"></i>
        <div style="font-size:13px;color:var(--color-text-secondary)">Click to upload .sql .txt .json</div>
        <input type="file" id="file-upload" class="hidden" accept=".sql,.txt,.json,.xml,.csv" onchange="loadFile(event)">
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;align-items:center">
      <button class="btn btn-primary" onclick="runOptimizer()"><i class="ti ti-wand"></i> Analyze & Optimize</button>
      <button class="btn btn-sm" onclick="loadExample()"><i class="ti ti-file-code"></i> Load Example</button>
      <button class="btn btn-sm" onclick="document.getElementById('query-input').value=''"><i class="ti ti-trash"></i> Clear</button>
    </div>
  </div>
  <div id="optimizer-results" class="hidden">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px" id="score-cards"></div>
    <div class="card"><div class="card-title"><i class="ti ti-alert-triangle"></i> Issues Detected</div><div id="findings-list"></div></div>
    <div class="card">
      <div class="card-title"><i class="ti ti-check"></i> Optimized Query</div>
      <textarea class="code-editor" id="optimized-query" readonly style="min-height:120px"></textarea>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-sm" onclick="copyTextById('optimized-query')"><i class="ti ti-copy"></i> Copy</button>
        <button class="btn btn-sm" onclick="exportResult()"><i class="ti ti-download"></i> Export</button>
      </div>
    </div>
    <div class="card"><div class="card-title"><i class="ti ti-info-circle"></i> Optimization Explanation</div><div id="opt-explanation" class="result-stream"></div></div>
  </div>
  <div id="opt-loading" class="hidden" style="text-align:center;padding:40px">
    <div class="spinner" style="margin:0 auto 12px"></div>
    <div style="font-size:13px;color:var(--color-text-secondary)">Analyzing query with AI...</div>
  </div>`;
}

function switchInputTab(btn, mode) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('input-paste').classList.toggle('hidden', mode !== 'paste');
  document.getElementById('input-upload').classList.toggle('hidden', mode !== 'upload');
}

function loadFile(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => { document.getElementById('query-input').value = ev.target.result; switchInputTab(document.querySelectorAll('.tab')[0],'paste'); };
  r.readAsText(f);
}

function loadExample() {
  const db = document.getElementById('db-select').value;
  const examples = {
    "MongoDB": `db.orders.find({\n  status: "active",\n  $where: "this.total > 1000"\n}).sort({created_at: -1})`,
    "default": `SELECT *\nFROM orders o, customers c, products p\nWHERE o.customer_id = c.id\n  AND o.product_id = p.id\n  AND UPPER(c.email) = 'USER@EXAMPLE.COM'\n  AND p.category = 'Electronics'\nORDER BY o.created_at DESC`
  };
  document.getElementById('query-input').value = examples[db] || examples.default;
}

async function runOptimizer() {
  const query = document.getElementById('query-input').value.trim();
  if (!query) { alert("Please enter a query first"); return; }
  const db = document.getElementById('db-select').value;
  document.getElementById('opt-loading').classList.remove('hidden');
  document.getElementById('optimizer-results').classList.add('hidden');

  const sys = `You are an expert database query optimizer specializing in ${db}. Return ONLY valid JSON:
{"originalScore":number,"optimizedScore":number,"findings":[{"type":"string","severity":"HIGH|MEDIUM|LOW","impact":"string","explanation":"string","fix":"string"}],"optimizedQuery":"string","explanation":{"changes":["string"],"benefits":["string"],"risks":["string"]}}`;

  try {
    const raw = await callAI(sys, `Analyze and optimize this ${db} query:\n\n${query}`);
    const data = JSON.parse(raw.replace(/\`\`\`json|\`\`\`/g,'').trim());
    document.getElementById('opt-loading').classList.add('hidden');
    document.getElementById('optimizer-results').classList.remove('hidden');

    const c1 = data.originalScore < 40 ? '#E24B4A' : data.originalScore < 70 ? '#EF9F27' : '#639922';
    const c2 = data.optimizedScore < 40 ? '#E24B4A' : data.optimizedScore < 70 ? '#EF9F27' : '#639922';
    document.getElementById('score-cards').innerHTML = `
      <div class="card" style="margin:0"><div class="stat-label">Original Score</div>
        <div style="font-size:28px;font-weight:500;color:${c1}">${data.originalScore}<span style="font-size:16px;color:var(--color-text-secondary)">/100</span></div>
        <div class="score-bar"><div class="score-fill" style="width:${data.originalScore}%;background:${c1}"></div></div></div>
      <div class="card" style="margin:0"><div class="stat-label">Optimized Score</div>
        <div style="font-size:28px;font-weight:500;color:${c2}">${data.optimizedScore}<span style="font-size:16px;color:var(--color-text-secondary)">/100</span></div>
        <div class="score-bar"><div class="score-fill" style="width:${data.optimizedScore}%;background:${c2}"></div></div></div>`;

    document.getElementById('findings-list').innerHTML = (data.findings||[]).map(f => {
      const sev = {HIGH:'badge-red',MEDIUM:'badge-amber',LOW:'badge-blue'}[f.severity]||'badge-blue';
      return `<div class="finding"><div class="finding-header"><span class="badge ${sev}">${f.severity}</span><strong style="font-size:13px">${f.type}</strong></div>
        <div class="finding-body"><b>Impact:</b> ${f.impact}<br>${f.explanation}<div class="finding-fix"><b>Fix:</b> ${f.fix}</div></div></div>`;
    }).join('') || '<div style="font-size:13px;color:var(--color-text-secondary)">No major issues detected.</div>';

    document.getElementById('optimized-query').value = data.optimizedQuery || query;
    const exp = data.explanation||{};
    let html = '';
    if (exp.changes?.length) html += `<b>Changes made:</b><ul style="margin:4px 0 8px 16px;font-size:12px">${exp.changes.map(c=>`<li>${c}</li>`).join('')}</ul>`;
    if (exp.benefits?.length) html += `<b>Expected benefits:</b><ul style="margin:4px 0 8px 16px;font-size:12px">${exp.benefits.map(b=>`<li>${b}</li>`).join('')}</ul>`;
    if (exp.risks?.length) html += `<b>Potential risks:</b><ul style="margin:4px 0 8px 16px;font-size:12px">${exp.risks.map(r=>`<li>${r}</li>`).join('')}</ul>`;
    document.getElementById('opt-explanation').innerHTML = html;
    analysisHistory.unshift({db, score:data.originalScore, optimized:data.optimizedScore, time:new Date().toLocaleTimeString(), query:query.substring(0,60)+'...'});
  } catch(err) {
    document.getElementById('opt-loading').classList.add('hidden');
    alert("Error: " + err.message);
  }
}

async function runCompare() {

  document.getElementById('compare-loading').classList.remove('hidden');
  document.getElementById('compare-results').classList.add('hidden');

  const sys = `Compare two SQL/NoSQL queries. Return ONLY valid JSON:
{"scoreA":{"cost":number,"complexity":number,"readability":number,"scalability":number},"scoreB":{"cost":number,"complexity":number,"readability":number,"scalability":number},"improvements":["string"],"regressions":["string"],"recommendation":"A or B","rationale":"string"}
All scores 0-100.`;

  try {
    const raw = await callAI(sys, `Compare:\n\nQuery A:\n${a}\n\nQuery B:\n${b}`);
    const d = JSON.parse(raw.replace(/\`\`\`json|\`\`\`/g,'').trim());
    document.getElementById('compare-loading').classList.add('hidden');
    document.getElementById('compare-results').classList.remove('hidden');

    const metrics = ['cost','complexity','readability','scalability'];
    document.getElementById('compare-results').innerHTML = `
      <div class="card">
        <div class="card-title"><i class="ti ti-chart-bar"></i> Score Comparison</div>
        ${metrics.map(m=>`<div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
            <span style="color:var(--color-text-secondary);text-transform:capitalize">${m}</span>
            <span><b>A: ${d.scoreA[m]}</b> vs <b>B: ${d.scoreB[m]}</b></span>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
            <div class="score-bar"><div class="score-fill" style="width:${d.scoreA[m]}%;background:#378ADD"></div></div>
            <div class="score-bar"><div class="score-fill" style="width:${d.scoreB[m]}%;background:#1D9E75"></div></div>
          </div></div>`).join('')}
        <div style="display:flex;gap:12px;font-size:12px;margin-top:4px">
          <span><span style="display:inline-block;width:12px;height:4px;background:#378ADD;border-radius:2px;margin-right:4px;vertical-align:middle"></span>Version A</span>
          <span><span style="display:inline-block;width:12px;height:4px;background:#1D9E75;border-radius:2px;margin-right:4px;vertical-align:middle"></span>Version B</span>
        </div>
      </div>
      <div class="card">
        <div class="card-title"><i class="ti ti-trophy"></i> Verdict</div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <span class="badge" style="background:#E6F1FB;color:#185FA5;font-size:14px;padding:6px 14px">Use Version ${d.recommendation}</span>
          <span style="font-size:13px">${d.rationale}</span>

        ${d.improvements?.length?`<div><b style="font-size:12px">Improvements in B:</b>${d.improvements.map(i=>`<div style="font-size:12px;padding:3px 0;color:var(--color-text-success)">✓ ${i}</div>`).join('')}</div>`:''}
        ${d.regressions?.length?`<div style="margin-top:8px"><b style="font-size:12px">Regressions in B:</b>${d.regressions.map(r=>`<div style="font-size:12px;padding:3px 0;color:var(--color-text-danger)">✗ ${r}</div>`).join('')}</div>`:''}
      </div>`;
  } catch(err) {
    document.getElementById('compare-loading').classList.add('hidden');
    alert("Error: " + err.message);
  }
}

      </div>`;
  } catch(err) {
    document.getElementById('datagen-loading').classList.add('hidden');
    alert("Error: " + err.message);
  }
}

// ── NL ASSISTANT ──────────────────────────────────────────────────────────────
function renderNL(c) {
  c.innerHTML = `
  <div class="card" style="display:flex;flex-direction:column;min-height:500px">
    <div class="card-title"><i class="ti ti-message-chatbot"></i> Natural Language Database Assistant</div>
    <div class="chat-messages" id="chat-msgs" style="flex:1;overflow-y:auto">
      <div class="chat-msg"><div class="chat-bubble ai">Hi! Ask me anything about queries, execution plans, performance, or optimization.<br><br>• "Why is this query slow?"<br>• "How can I improve this join?"<br>• "Generate an index recommendation"<br>• "Explain this execution plan"</div></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <input type="text" id="nl-input" placeholder="Ask a database question..." style="flex:1" onkeydown="if(event.key==='Enter')sendNL()">
      <button class="btn btn-primary" onclick="sendNL()"><i class="ti ti-send"></i></button>
    </div>
    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
      ${["Why is SELECT * bad?","What indexes should I add?","Explain EXPLAIN ANALYZE","How to fix N+1 queries?"].map(q=>`<button class="btn btn-sm" onclick="quickNL('${q}')">${q}</button>`).join('')}
    </div>
  </div>`;
}

function quickNL(q) { document.getElementById('nl-input').value = q; sendNL(); }

async function sendNL() {
  const input = document.getElementById('nl-input');
  const msg = input.value.trim(); if (!msg) return;
  const db = document.getElementById('db-select').value;
  input.value = '';
  const msgs = document.getElementById('chat-msgs');
  msgs.innerHTML += `<div class="chat-msg user"><div class="chat-bubble user">${msg}</div></div>`;
  msgs.innerHTML += `<div class="chat-msg" id="ai-typing"><div class="chat-bubble ai"><div class="spinner" style="width:14px;height:14px;margin:2px"></div></div></div>`;
  msgs.scrollTop = msgs.scrollHeight;
  chatHistory.push({role:"user",content:msg});

  try {
    const resp = await callAI(`You are an expert ${db} database assistant. Give concise, practical answers.`, chatHistory.map(m=>`${m.role}: ${m.content}`).join('\n'));
    chatHistory.push({role:"assistant",content:resp});
    document.getElementById('ai-typing').innerHTML = `<div class="chat-bubble ai">${resp.replace(/\n/g,'<br>')}</div>`;
    msgs.scrollTop = msgs.scrollHeight;
  } catch(err) {
    document.getElementById('ai-typing').innerHTML = `<div class="chat-bubble ai" style="color:var(--color-text-danger)">Error: ${err.message}</div>`;
  }
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard(c) {
  const total = analysisHistory.length;
  const avgScore = total ? Math.round(analysisHistory.reduce((a,b)=>a+b.score,0)/total) : 0;
  const avgOpt = total ? Math.round(analysisHistory.reduce((a,b)=>a+b.optimized,0)/total) : 0;
  c.innerHTML = `
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Total Analyses</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Avg Original Score</div><div class="stat-value">${avgScore}</div></div>
    <div class="stat-card"><div class="stat-label">Avg Optimized Score</div><div class="stat-value">${avgOpt}</div></div>
    <div class="stat-card"><div class="stat-label">Avg Improvement</div><div class="stat-value" style="color:#1D9E75">+${avgOpt-avgScore}</div></div>
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-history"></i> Analysis History</div>
    ${total===0?'<div style="text-align:center;padding:40px;color:var(--color-text-secondary);font-size:13px">No analyses yet. Run your first query optimization above.</div>':
    analysisHistory.map(h=>`<div class="history-item">
      <div class="history-icon" style="background:#E6F1FB;color:#185FA5"><i class="ti ti-database"></i></div>
      <div style="flex:1;min-width:0"><div style="font-size:12px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h.query}</div><div style="font-size:11px;color:var(--color-text-tertiary)">${h.db} · ${h.time}</div></div>
      <div style="text-align:right"><span class="badge badge-red">${h.score}</span><span style="color:var(--color-text-tertiary);font-size:11px;margin:0 4px">→</span><span class="badge badge-green">${h.optimized}</span></div>
    </div>`).join('')}
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-key"></i> AI Provider Status</div>
    <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:12px">API keys are saved per Windows user in Credential Manager. They are not stored in the browser or bundled with the app. Status of each provider:</p>
    <div id="provider-status" style="font-size:13px">Checking...</div>
  </div>`;
  loadProviderStatus();
}

async function loadProviderStatus() {
  const el = document.getElementById('provider-status');
  try {
    const resp = await fetch('/api/providers');
    const data = await resp.json();
    el.innerHTML = data.providers.map(p =>
      `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary)">
        <span>${p.label}</span>
        <span class="badge ${p.configured ? 'badge-green' : 'badge-red'}">${p.configured ? 'Configured' : 'Not configured'}</span>
      </div>`).join('');
  } catch (err) {
    el.innerHTML = `<span style="color:var(--color-text-danger)">Could not reach backend server. Make sure "node server.js" is running.</span>`;
  }
}

// ── UTILITIES ──────────────────────────────────────────────────────────────────
function copyTextById(id) {
  const el = document.getElementById(id);
  navigator.clipboard.writeText(el.value||el.textContent).then(()=>{
    const btn = event.target.closest('button');
    const orig = btn.innerHTML;
    btn.textContent='Copied!';
    setTimeout(()=>btn.innerHTML=orig, 1500);
  });
}
function downloadText(text, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text],{type:'text/plain'}));
  a.download = filename; a.click();
}
function exportResult() {
  const q = document.getElementById('optimized-query')?.value||'';
  const exp = document.getElementById('opt-explanation')?.innerText||'';
  downloadText(`QUERYMIND OPTIMIZATION REPORT\n${'='.repeat(40)}\n\nOptimized Query:\n${q}\n\nExplanation:\n${exp}`, 'optimization-report.txt');
}

loadConfiguredProviders();
renderPage('optimizer');
</script>
